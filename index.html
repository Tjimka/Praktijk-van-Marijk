  <style>
    body { margin: 0; }

    /* Over-pagina — hero */
    .over-hero {
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) minmax(0, 360px);
      gap: 56px;
      padding: 56px 48px 48px;
      align-items: start;
    }
    .over-hero__text > h1,
    .over-hero__text > p { max-width: 60ch; }
    .over-hero__portret { width: 100%; }

    @media (max-width: 960px) {
      .over-hero {
        grid-template-columns: minmax(0, 1.4fr) minmax(0, 300px);
        gap: 40px;
        padding: 48px 32px 40px;
      }
    }
    @media (max-width: 720px) {
      .over-hero {
        grid-template-columns: 1fr;
        gap: 32px;
        padding: 40px 24px 32px;
      }
      .over-hero__portret {
        max-width: 320px;
        margin: 0 auto;
      }
    }

    /* Algemene voorwaarden — 2-col → 1-col */
    @media (max-width: 960px) {
      .pvm-av__body {
        grid-template-columns: 1fr !important;
        gap: 32px !important;
        padding: 40px 32px 56px !important;
      }
      .pvm-av__toc {
        position: relative !important;
        top: 0 !important;
        background: var(--bg-sunken);
        border: 0.5px solid var(--line);
        border-radius: 6px;
        padding: 20px 22px;
      }
    }
    @media (min-width: 961px) {
      .pvm-av__toc {
        position: sticky;
        top: 100px;
      }
    }
    @media (max-width: 720px) {
      .pvm-av__hero { padding: 48px 24px 32px !important; }
      .pvm-av__body { padding: 32px 24px 48px !important; }
      .pvm-av__article { padding: 36px 0 !important; }
      .pvm-av__contact { padding: 24px 22px !important; }
    }

    /* Algemene voorwaarden — extra tight on small phones */
    @media (max-width: 480px) {
      .pvm-av__hero { padding: 40px 20px 28px !important; }
      .pvm-av__body { padding: 28px 20px 40px !important; }
      .pvm-av__article-rule { display: none !important; }
      .pvm-av .pvm-av__bg-grid {
        grid-template-columns: 1fr !important;
        row-gap: 2px !important;
      }
      .pvm-av .pvm-av__bg-grid > [data-bg="label"] {
        padding-top: 10px !important;
      }
      .pvm-av .pvm-av__bg-grid > [data-bg="label"]:first-child {
        padding-top: 0 !important;
      }
    }

    /* Algemene voorwaarden — print stylesheet */
    @media print {
      @page { size: A4; margin: 18mm 16mm 20mm 16mm; }
      html, body {
        background: #fff !important;
        color: #2E1F0E !important;
      }
      /* hide everything */
      body * { visibility: hidden !important; }
      /* show only the voorwaarden block + its descendants */
      .pvm-av, .pvm-av * { visibility: visible !important; }
      .pvm-av {
        position: absolute !important;
        inset: 0 !important;
        left: 0 !important; top: 0 !important;
        width: 100% !important;
        padding: 0 !important;
      }
      /* hide download button + meta row when printing */
      .pvm-av__meta { display: none !important; }
      .pvm-av__toc { display: none !important; }
      .pvm-av__hero {
        padding: 0 0 24px !important;
        max-width: none !important;
        border-bottom: 0.5px solid #C8BDA9;
        margin-bottom: 24px !important;
      }
      .pvm-av__body {
        display: block !important;
        padding: 0 !important;
        gap: 0 !important;
      }
      .pvm-av__articles { max-width: none !important; }
      .pvm-av__article {
        page-break-inside: avoid;
        padding: 18px 0 !important;
        border-top: 0.5px solid #E0D8CC !important;
      }
      .pvm-av__article:first-child { border-top: none !important; }
      .pvm-av__contact {
        page-break-inside: avoid;
        background: #FAF8F4 !important;
        color: #2E1F0E !important;
        border: 0.5px solid #C8BDA9 !important;
        border-left: 3px solid #89221D !important;
        margin-top: 28px !important;
      }
      .pvm-av__contact * { color: #2E1F0E !important; }
      .pvm-av__contact a { color: #89221D !important; border-bottom: 0.5px solid #89221D !important; }
      a { color: inherit !important; text-decoration: none !important; }
    }
  </style>
