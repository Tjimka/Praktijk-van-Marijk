<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-root">
  <div class="row" style="gap:20px; align-items:center">
    <div style="flex:1">
      <div style="height:52px; background:var(--surface); border:0.5px solid var(--line); border-radius:6px"></div>
      <div class="mono" style="margin-top:8px">geen · rust</div>
    </div>
    <div style="flex:1">
      <div style="height:52px; background:var(--surface); border:0.5px solid var(--line); border-radius:6px; box-shadow:0 1px 2px rgba(46,31,14,.05)"></div>
      <div class="mono" style="margin-top:8px">shadow-sm · dropdown</div>
    </div>
    <div style="flex:1">
      <div style="height:52px; background:var(--surface); border:0.5px solid var(--line); border-radius:6px; box-shadow:0 4px 16px rgba(46,31,14,.06)"></div>
      <div class="mono" style="margin-top:8px">shadow-md · modal</div>
    </div>
  </div>
  <div class="cap" style="margin-top:14px">Elevatie — zeer terughoudend · pagina-niveau heeft géén shadow</div>
</div>
</body></html>
