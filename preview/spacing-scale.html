<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-root">
  <div class="wrap" style="gap:14px; align-items:flex-end">
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px">
      <div style="width:4px;  height:24px; background:var(--fg1); border-radius:2px"></div><span class="mono">4</span>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px">
      <div style="width:8px;  height:24px; background:var(--fg1); border-radius:2px"></div><span class="mono">8</span>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px">
      <div style="width:12px; height:24px; background:var(--fg1); border-radius:2px"></div><span class="mono">12</span>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px">
      <div style="width:16px; height:24px; background:var(--fg1); border-radius:2px"></div><span class="mono">16</span>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px">
      <div style="width:24px; height:24px; background:var(--fg1); border-radius:2px"></div><span class="mono">24</span>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px">
      <div style="width:32px; height:24px; background:var(--fg1); border-radius:2px"></div><span class="mono">32</span>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px">
      <div style="width:48px; height:24px; background:var(--fg1); border-radius:2px"></div><span class="mono">48</span>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px">
      <div style="width:64px; height:24px; background:var(--fg1); border-radius:2px"></div><span class="mono">64</span>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px">
      <div style="width:96px; height:24px; background:var(--fg1); border-radius:2px"></div><span class="mono">96</span>
    </div>
  </div>
  <div style="margin-top:14px" class="cap">Spacing — 8px basis · schaal 4/8/12/16/24/32/48/64/96/128</div>
</div>
</body></html>
