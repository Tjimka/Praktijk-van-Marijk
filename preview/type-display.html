<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-root">
  <div class="col" style="gap:14px">
    <div style="display:flex; align-items:baseline; gap:16px">
      <span style="font-family:Lora,serif; font-size:44px; font-weight:500; color:var(--fg1); line-height:1.15">Display</span>
      <span class="mono">Lora · 44 / 500</span>
    </div>
    <hr class="thin"/>
    <div style="display:flex; align-items:baseline; gap:16px">
      <span style="font-family:Lora,serif; font-size:30px; font-weight:500; color:var(--fg1); line-height:1.35">Heading 1</span>
      <span class="mono">Lora · 30 / 500</span>
    </div>
    <hr class="thin"/>
    <div style="display:flex; align-items:baseline; gap:16px">
      <span style="font-family:Lora,serif; font-size:22px; font-weight:500; color:var(--fg1)">Heading 2</span>
      <span class="mono">Lora · 22 / 500</span>
    </div>
    <hr class="thin"/>
    <div style="display:flex; align-items:baseline; gap:16px">
      <span style="font-family:Lora,serif; font-style:italic; font-size:22px; font-weight:400; color:var(--fg1)">Quote — italic 400</span>
      <span class="mono">Lora · 22 / 400 italic</span>
    </div>
  </div>
</div>
</body></html>
