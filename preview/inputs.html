<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-root">
  <div class="col" style="gap:14px">
    <div>
      <label style="display:block; font-size:13px; font-weight:500; color:#2E1F0E; margin-bottom:6px">Naam</label>
      <input type="text" value="Sanne de Vries"
             style="width:100%; box-sizing:border-box; font-family:Inter; font-size:15px; color:#2E1F0E; background:#fff; border:0.5px solid #C8BDA9; border-radius:4px; padding:10px 12px"/>
    </div>
    <div>
      <label style="display:block; font-size:13px; font-weight:500; color:#2E1F0E; margin-bottom:6px">E-mail</label>
      <input type="email" placeholder="naam@organisatie.nl"
             style="width:100%; box-sizing:border-box; font-family:Inter; font-size:15px; color:#2E1F0E; background:#fff; border:0.5px solid #89221D; border-radius:4px; padding:10px 12px; box-shadow:0 0 0 3px rgba(137,34,29,.35); outline:none"/>
      <div class="mono" style="margin-top:6px">Focus state · bordeaux border + 3px ring</div>
    </div>
    <div>
      <label style="display:block; font-size:13px; font-weight:500; color:#2E1F0E; margin-bottom:6px">Bericht</label>
      <textarea style="width:100%; box-sizing:border-box; font-family:Inter; font-size:15px; line-height:1.7; color:#2E1F0E; background:#fff; border:0.5px solid #C8BDA9; border-radius:4px; padding:10px 12px; min-height:72px; resize:vertical">Ik zit vast op een casus waar…</textarea>
    </div>
  </div>
</div>
</body></html>
