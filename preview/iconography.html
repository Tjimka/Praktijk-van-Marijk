<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div class="card-root">
  <div class="row" style="gap:24px; align-items:center; flex-wrap:wrap">
    <i data-lucide="file-text"  style="color:#2E1F0E"></i>
    <i data-lucide="users"       style="color:#2E1F0E"></i>
    <i data-lucide="message-square" style="color:#2E1F0E"></i>
    <i data-lucide="clipboard-check" style="color:#2E1F0E"></i>
    <i data-lucide="book-open"   style="color:#2E1F0E"></i>
    <i data-lucide="arrow-right" style="color:#89221D"></i>
    <i data-lucide="check"       style="color:#89221D"></i>
    <i data-lucide="mail"        style="color:#2E1F0E"></i>
    <i data-lucide="phone"       style="color:#2E1F0E"></i>
    <i data-lucide="map-pin"     style="color:#2E1F0E"></i>
  </div>
  <div class="cap" style="margin-top:14px">Lucide · 1.5px stroke · currentColor · 24px default</div>
</div>
<script>lucide.createIcons({ attrs: { 'stroke-width': 1.5 } });</script>
</body></html>
