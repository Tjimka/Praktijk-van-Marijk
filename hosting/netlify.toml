# Netlify config — Praktijk van Marijk
# Geen build step nodig; alles is statisch.

[build]
  publish = "."

# Hash-routing (#home, #over, ...) hoeft geen redirect.
# Alleen 404 → index.html zodat directe links zoals /over alsnog laden.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*.jsx"
  [headers.values]
    Content-Type = "text/babel; charset=utf-8"
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
